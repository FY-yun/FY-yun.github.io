<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>文件数据库</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="clickable-text" onclick="redirectToPage()">数据库主页</div>

    <div class="folder-card" onclick="openFolder('1/dm.html')">
        <div class="folder-icon"></div>
        <div class="folder-details">
            <div class="folder-name">枫叶的文件库</div>
            <div class="folder-info">文件数量: 1, 文件大小: 10MB, 创建时间: 2023-10-26</div>
        </div>
    </div>

    <div class="folder-card" onclick="openFolder('2/daim.html')">
        <div class="folder-icon"></div>
        <div class="folder-details">
            <div class="folder-name">代码库</div>
            <div class="folder-info">文件数量: 2, 文件大小: 2kB, 创建时间: 2023-10-26</div>
        </div>
    </div>
	
	<div class="folder-card" onclick="openFolder('3/dmk.html')">
	    <div class="folder-icon"></div>
	    <div class="folder-details">
	        <div class="folder-name">动漫库</div>
	        <div class="folder-info">文件数量: ,0 文件大小: 0MB, 创建时间: 2023-10-26</div>
	    </div>
	</div>
    <!-- 添加更多文件夹卡片 -->

<script>
	function redirectToPage() {
	        window.location.href = '#';
	}
    function openFolder(folderName) {
        window.location.href = './nr/' + folderName;
    }
</script>
</body>
</html>
