		<h1>米游社活动爬虫</h1>
		<p>对米游社区活动进行请求，会发现请求失败</p>
		<p>首判断响应，请求失败的主要原因就是他检测到了我是爬虫进行的请求</p>
		<p>所以我们得让他认为我们是人类进行请求</p>
		<p>反爬虫的方式有很多，这里就不一一举例了，我用的方法是开一个另外的浏览器</p>

		<p>我们暂时无法提供图片，遇到任何问题在主页联系我们即可</p>
		<p>你对网页访了: <span id="visits"></span>次</p>

			var visits = localStorage.getItem('visits') ? parseInt(localStorage.getItem('visits')) : 0;

			localStorage.setItem('visits', visits);
			document.getElementById('visits').innerText = visits;
