<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>文件数据库</title>
    <style>
        .folder-card {
            border: 1px solid #ccc;
            margin: 10px;
            padding: 10px;
            display: flex;
            align-items: center;
            cursor: pointer;
			border-radius: 10px;
        }

        .folder-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            background: url('../../img/文件.png') no-repeat center;
			background-size: contain;
        }

        .folder-details {
            flex-grow: 1;
        }

        .folder-name {
            font-weight: bold;
        }

        .folder-info {
            font-size: 14px;
        }

        .folder-card:hover {
            background-color: #4aeecb;
        }
		.clickable-text {
		    font-weight: bold;
			padding: 30px;
			background-color: #9799ff;
			border-radius: 10px;
		}
		@media (max-width: 600px) {
		    .folder-card {
		        flex-direction: column;
		        align-items: flex-start;
		    }
		
		    .folder-icon {
		        margin-bottom: 10px;
		    }
		
		    .clickable-text {
		        padding: 15px;
		    }
		}
		.modal {
			position: fixed;
			z-index: 1;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			overflow: auto;
			background-color: rgba(0,0,0,0.4);
		}
		.modal-content {
			background-color: #fefefe;
			margin: 0 auto;
			padding: 20px;
			border: 1px solid #888;
			width: 80%;
			border-radius: 10px;
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
		}
		.close {
			display: none;
		}
    </style>
</head>
<body onload="openModal()">
	<div id="myModal" class="modal">
		<div class="modal-content">
			<span class="close" onclick="closeModal()">&times;</span>
			<p>公告</p>
			<p>本网站代码全部由枫叶一个人编写，用于学习参考，代码也是一门交流语言，如有侵权联系必删，本网站是技术交流可能会涉及到一些逆向有风险的代码，但是代码仅供学习，切勿用于违法事业</p>
			<button onclick="closeModal()">接受</button>
		</div>
	</div>
	<div class="clickable-text" onclick="redirectToPage()">代码主页</div>
    <div class="folder-card" onclick="openFolder('表情包/bqb.html')">
        <div class="folder-icon"></div>
        <div class="folder-details">
            <div class="folder-name">米游社数据爬取</div>
            <div class="folder-info">文件数量: 2, 文件大小: 3kB, 创建时间: 2023-10-26</div>
        </div>
    </div>

    <div class="folder-card" onclick="openFolder('mmb.html')">
        <div class="folder-icon"></div>
        <div class="folder-details">
            <div class="folder-name">黑客密码本</div>
            <div class="folder-info">文件数量: 1, 文件大小: 1kB, 创建时间: 2023-10-26</div>
        </div>
    </div>

    <!-- 添加更多文件夹卡片 -->

    <script>
        function openFolder(folderName) {
            // 这里可以添加打开文件夹的逻辑，例如加载文件列表等
            window.location.href = './' + folderName;
        }
		function openModal() {
			document.getElementById('myModal').style.display = "block";
		}
		function closeModal() {
			document.getElementById('myModal').style.display = "none";
		}
    </script>
</body>
</html>
