<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>文件数据库</title>
    <style>
        .folder-card {
            border: 1px solid #ccc;
            margin: 10px;
            padding: 10px;
            display: flex;
            align-items: center;
            cursor: pointer;
			border-radius: 10px;
        }

        .folder-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            background: url('../../../img/文件.png') no-repeat center;
			background-size: contain;
        }

        .folder-details {
            flex-grow: 1;
        }

        .folder-name {
            font-weight: bold;
        }

        .folder-info {
            font-size: 14px;
        }

        .folder-card:hover {
            background-color: #4aeecb;
        }
		.clickable-text {
		    font-weight: bold;
			padding: 30px;
			background-color: #9799ff;
			border-radius: 10px;
		}
		@media (max-width: 600px) {
		    .folder-card {
		        flex-direction: column;
		        align-items: flex-start;
		    }
		
		    .folder-icon {
		        margin-bottom: 10px;
		    }
		
		    .clickable-text {
		        padding: 15px;
		    }
		}
    </style>
</head>
<body>
	<div class="clickable-text" onclick="redirectToPage()">米爬虫</div>
	
    <div class="folder-card" onclick="openFolder('mi/mi.html')">
        <div class="folder-icon"></div>
        <div class="folder-details">
            <div class="folder-name">表情包爬取</div>
            <div class="folder-info">文件数量: 1, 文件大小: 1kB, 创建时间: 2023-10-26</div>
        </div>
    </div>

    <div class="folder-card" onclick="openFolder('mi/mibq.html')">
        <div class="folder-icon"></div>
        <div class="folder-details">
            <div class="folder-name">活动信息爬取</div>
            <div class="folder-info">文件数量: 1, 文件大小: 2kB, 创建时间: 2023-10-26</div>
        </div>
    </div>

    <!-- 添加更多文件夹卡片 -->

    <script>
        function openFolder(folderName) {
            // 这里可以添加打开文件夹的逻辑，例如加载文件列表等
            window.location.href = './' + folderName;
        }
    </script>
</body>
</html>
