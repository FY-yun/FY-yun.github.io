<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <style>
    body {
      font-family: Arial, sans-serif; /* 设置通用字体 */
      padding: 20px; /* 通用内边距 */
    }
    h1 {
      text-align: center; /* 居中对齐标题 */
    }
    h2 {
      text-align: center; /* 居中对齐子标题 */
    }
    p {
      text-align: center; /* 居中对齐日期 */
    }
    img {
      width: 100%; /* 图片宽度100%，裁剪超出视图 */
      height: auto; /* 图片高度自适应 */
    }

    @media screen and (max-width: 768px) {
      /* 在小屏幕上应用的样式 */
      body {
        text-align: center; /* 居中对齐整个页面内容 */
      }
    }
  </style>
</head>
<body>
  <h1>第二篇博客</h1>
  <p>日期：2023-10-14</p>
  
  <h2>好耶，在经历了小一个月的网站开发也是在今天完成了</h2>
  <img src="img/662B9ECE60F5B65575CA523C26A3F6C4.jpg" alt="图片1">
  <h2>嘿嘿,以后学习内容和教程我将在这里与各位分享</h2>
  <img src="img/5CC26536662DF11B93CEFA1C697B2BC8.png" alt="图片2">
  <h2>在未来和各位一起见证，科技的时代</h2>
  <h2>只要能努力，就应当去努力；只要还能前进，就要向前走去</h2>
</body>
</html>
