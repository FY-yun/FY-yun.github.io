<!DOCTYPE html>
<html>
<body>
<p id="demo"></p>
<script>
// 假设你有以下JSON数据
var json = {
  "标题": "这是标题",
  "详细内容": "这是详细内容"
};

// 使用JavaScript来解析JSON数据并生成HTML内容
document.getElementById("demo").innerHTML = JSON.stringify(json, null, 2).replace(/\n/g, "<br>").replace(/ /g, "&nbsp;");
</script>

</body>
</html>
